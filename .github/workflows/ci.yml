name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun turbo build

      # Note: Typecheck is included in build step (TypeScript compilation during build)
      # Separate typecheck causes monorepo project reference issues
      
      # Note: Tests are temporarily disabled due to Bun + React Native Jest incompatibility
      # See: https://github.com/oven-sh/bun/issues/4293
      # - name: Test
      #   run: bun turbo test

  perf-test:
    name: Performance regression
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun turbo build --filter=@truongdq01/ui...

      # Note: Perf tests skipped due to react-native-gesture-handler incompatibility with Jest
      # See: https://github.com/reactwg/react-native-reanimated/discussions/1889
      # - name: Run render-count performance tests
      #   run: cd packages/ui && bun test:perf

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun turbo build

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup .npmrc for publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ${{ github.workspace }}/.npmrc
          echo "@truongdq01:registry=https://registry.npmjs.org/" >> ${{ github.workspace }}/.npmrc
          cat ${{ github.workspace }}/.npmrc

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/tokens && npm publish --access public
          cd ../headless && npm publish --access public
          cd ../themes && npm publish --access public
          cd ../ui && npm publish --access public

      - name: Create and push tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v1.0.0 -m "Release v1.0.0" || true
          git push --tags

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build docs site
        run: cd docs && bun run build
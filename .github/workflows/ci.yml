name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Headless package runs Jest under real Node (Bun’s `node` shim breaks Jest/stack-utils).
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun turbo build

      - name: Lint
        run: bun turbo lint

      - name: Typecheck
        run: bun turbo typecheck --filter=@truongdq01/ui --filter=@truongdq01/headless --filter=@truongdq01/themes --filter=@truongdq01/tokens

      - name: Test
        run: bun turbo test

  perf-test:
    name: Performance regression
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - run: bun install

      - name: Build packages
        run: bun turbo build --filter=@truongdq01/ui...

      - name: Perf tests
        run: bun turbo test:perf --filter=@truongdq01/ui...

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: bun install
      - name: Build docs site
        run: cd docs && bun run build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only release from master — develop is for work-in-progress
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build packages
        run: bun turbo build

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup .npmrc for publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ${{ github.workspace }}/.npmrc
          echo "@truongdq01:registry=https://registry.npmjs.org/" >> ${{ github.workspace }}/.npmrc

      - name: Publish packages to npm (skip if version exists)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_new() {
            PKG_DIR=$1
            cd $PKG_DIR
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
            if [ -z "$PUBLISHED" ]; then
              echo "Publishing $PKG_NAME@$PKG_VERSION..."
              npm publish --access public
            else
              echo "Skipping $PKG_NAME@$PKG_VERSION — already published"
            fi
            cd $GITHUB_WORKSPACE
          }
          publish_if_new packages/tokens
          publish_if_new packages/headless
          publish_if_new packages/themes
          publish_if_new packages/ui

      - name: Create and push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v$PKG_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push --tags
          fi
